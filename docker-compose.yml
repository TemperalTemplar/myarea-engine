version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: myarea_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myarea}
      POSTGRES_USER: ${POSTGRES_USER:-myarea}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myarea}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myarea_net

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: myarea_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - myarea_net

  # ─── Flask App ────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: myarea_games_web
    restart: unless-stopped
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-myarea}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-myarea}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-}
      - OIDC_DISCOVERY_URL=${OIDC_DISCOVERY_URL:-}
      # ── Cross-app service auth ────────────────────────────────
      - SERVICE_API_KEY=${SERVICE_API_KEY:-change-this-service-key}
      - SOCIAL_APP_URL=${SOCIAL_APP_URL:-http://myarea_social_web:5000}
      - PREFERRED_URL_SCHEME=${PREFERRED_URL_SCHEME:-https}
    volumes:
      - ./app:/app/app
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - myarea_net
      - myarea_shared_net   # ← shared with social app
    expose:
      - "5000"

  # ─── Celery Worker ────────────────────────────────────────────
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: myarea_games_celery
    restart: unless-stopped
    command: celery -A celery_worker.worker worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-myarea}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-myarea}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - SERVICE_API_KEY=${SERVICE_API_KEY:-change-this-service-key}
      - SOCIAL_APP_URL=${SOCIAL_APP_URL:-http://myarea_social_web:5000}
      - PREFERRED_URL_SCHEME=${PREFERRED_URL_SCHEME:-https}
    volumes:
      - ./app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - myarea_net
      - myarea_shared_net

  # ─── Celery Beat (Scheduler) ──────────────────────────────────
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    container_name: myarea_games_beat
    restart: unless-stopped
    command: celery -A celery_worker.worker beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-myarea}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-myarea}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - SERVICE_API_KEY=${SERVICE_API_KEY:-change-this-service-key}
      - SOCIAL_APP_URL=${SOCIAL_APP_URL:-http://myarea_social_web:5000}
      - PREFERRED_URL_SCHEME=${PREFERRED_URL_SCHEME:-https}
    volumes:
      - ./app:/app/app
    depends_on:
      - celery_worker
    networks:
      - myarea_net
      - myarea_shared_net

  # ─── Nginx ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: myarea_games_nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8921}:80"
      - "${HTTPS_PORT:-8922}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./app/static:/app/static:ro
      - uploads:/app/uploads:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - web
    networks:
      - myarea_net

volumes:
  postgres_data:
  redis_data:
  uploads:
  certbot_www:
  certbot_conf:

networks:
  myarea_net:
    driver: bridge
  # Shared network — both apps must join this to talk to each other
  myarea_shared_net:
    external: true
    name: myarea_shared_net

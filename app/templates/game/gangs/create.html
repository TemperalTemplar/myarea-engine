{% extends "layouts/base.html" %}
{% block title %}Create Gang{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="font-display mb-3" style="font-size:2rem;"><i class="bi bi-plus-circle text-accent"></i> CREATE GANG</div>
    <div class="ma-card p-4">
      <p class="text-muted mb-4" style="font-size:0.82rem;">
        Creating a gang costs <span class="text-gold">$50,000</span>. You must be level 5+.
        You will become the leader.
      </p>
      <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label class="form-label text-muted">Gang Name</label>
          <input type="text" name="name" class="form-control bg-dark border-secondary text-light"
            required minlength="3" maxlength="64" placeholder="The Black Hand">
        </div>
        <div class="mb-3">
          <label class="form-label text-muted">Tag <span class="text-muted" style="font-size:0.75rem;">(2–6 alphanumeric chars, shown as [TAG])</span></label>
          <input type="text" name="tag" class="form-control bg-dark border-secondary text-light"
            required minlength="2" maxlength="6" placeholder="TBH" style="text-transform:uppercase;">
        </div>
        <div class="mb-4">
          <label class="form-label text-muted">Description <span class="text-muted" style="font-size:0.75rem;">(optional)</span></label>
          <textarea name="description" class="form-control bg-dark border-secondary text-light"
            rows="3" maxlength="500" placeholder="What is your gang about?"></textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn-ma-primary flex-fill"
            data-confirm="Create gang for $50,000?">CREATE GANG</button>
          <a href="{{ url_for('gangs.index') }}" class="btn-ma-ghost flex-fill text-center">CANCEL</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
